services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sortyard
      POSTGRES_USER: sortyard
      POSTGRES_PASSWORD: sortyard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sortyard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
      - go_cache:/root/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://sortyard:sortyard@db:5432/sortyard?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  go_cache:
  frontend_node_modules:
